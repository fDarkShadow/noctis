name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get install -y --no-install-recommends libssh2-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo fmt --check
      - run: cargo clippy --locked -- -D warnings

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get install -y --no-install-recommends libssh2-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo test --locked

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo-audit
        id: cache-audit
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-0.22
      - uses: dtolnay/rust-toolchain@stable
        if: steps.cache-audit.outputs.cache-hit != 'true'
      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked
      - run: cargo audit

  feeds:
    name: Validate YAML feeds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache ys binary
        id: cache-ys
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/ys
          key: ys-${{ runner.os }}-0.9.1

      - uses: dtolnay/rust-toolchain@stable
        if: steps.cache-ys.outputs.cache-hit != 'true'

      - name: Install yaml-schema (ys)
        if: steps.cache-ys.outputs.cache-hit != 'true'
        run: cargo install yaml-schema --locked

      - name: Validate feeds
        run: |
          for f in tests/cve/*.yaml tests/misconfig/*.yaml; do
            ys -f schemas/feed.schema.json "$f"
          done

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get install -y --no-install-recommends libssh2-1-dev pkg-config
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:rust
          output: sarif-results
          upload: always
      - name: Fail on CodeQL findings
        run: |
          count=$(jq '[.runs[].results // [] | .[]] | length' sarif-results/rust.sarif)
          echo "CodeQL: $count finding(s)"
          [ "$count" -eq 0 ] || exit 1

  docker:
    name: Build & push (edge)
    needs: [lint, test, audit, feeds]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
