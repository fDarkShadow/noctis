name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    container: rust:alpine
    steps:
      - run: apk add --no-cache musl-dev pkgconfig libssh2-dev git
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --check
      - run: cargo clippy --locked -- -D warnings

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    container: rust:alpine
    steps:
      - run: apk add --no-cache musl-dev pkgconfig libssh2-dev git
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  feeds:
    name: Validate YAML feeds
    runs-on: ubuntu-latest
    container: rust:alpine
    steps:
      - run: apk add --no-cache git
      - uses: actions/checkout@v4
      - name: Install yaml-schema
        run: cargo install yaml-schema --locked
      - name: Validate feeds
        run: |
          for f in tests/cve/*.yaml tests/misconfig/*.yaml; do
            yaml-schema --schema schemas/feed.schema.json "$f"
          done

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y --no-install-recommends libssh2-1-dev pkg-config
      - uses: github/codeql-action/init@v3
        with:
          languages: rust
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:rust

  docker:
    name: Build & push (edge)
    needs: [lint, test, audit, feeds]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:edge
          cache-from: type=gha
          cache-to: type=gha,mode=max
