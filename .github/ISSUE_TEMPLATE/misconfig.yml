name: Misconfig — new feed
description: Implement detection for a misconfiguration
labels: ["type:misconfig", "status:available", "priority:medium"]
body:
  - type: input
    id: name
    attributes:
      label: Check name
      placeholder: "SSH root login enabled"
    validations:
      required: true

  - type: input
    id: product
    attributes:
      label: Target product / protocol
      placeholder: "OpenSSH"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
        - info
    validations:
      required: true

  - type: dropdown
    id: services
    attributes:
      label: Target services
      multiple: true
      options:
        - http
        - https
        - ssh
        - tcp
        - ftp
        - smtp
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What misconfiguration? What is the risk?
    validations:
      required: true

  - type: textarea
    id: detection_strategy
    attributes:
      label: Detection strategy
      description: How to detect it (banner, endpoint, header, certificate…)?
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: CIS Benchmark, NIST, best practices (one URL per line)
