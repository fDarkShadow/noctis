name: Bug report
description: Quelque chose ne fonctionne pas comme attendu
labels: ["type:bug", "status:available"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Composant concerné
      options:
        - Engine (runner / steps)
        - API REST (/scans)
        - Feed YAML (détection incorrecte)
        - Infrastructure (infra/ / Docker mocks)
        - CLI
        - Autre
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description du problème
      description: Ce qui se passe, ce qui était attendu.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Lancer noctis serve ...
        2. POST /scans avec { ... }
        3. Observer ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Coller la sortie de noctis (avec `-v` si possible) ou le résultat Ansible.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "git rev-parse --short HEAD"
    validations:
      required: true
