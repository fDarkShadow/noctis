name: Bug report
description: Something is not working as expected
labels: ["type:bug", "status:available"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Engine (runner / steps)
        - REST API (/scans)
        - YAML feed (incorrect detection)
        - Infrastructure (infra/ / Docker mocks)
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happens, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run noctis serve ...
        2. POST /scans with { ... }
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste noctis output (with `-v` if possible) or Ansible results.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "git rev-parse --short HEAD"
    validations:
      required: true
