name: Feature request
description: Proposer une nouvelle fonctionnalité ou une amélioration
labels: ["type:feature", "status:available"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Domaine
      options:
        - Nouveau type d'action (step)
        - Amélioration engine / runner
        - API REST
        - Feed / modèle YAML
        - Infrastructure / mocks
        - CLI / UX
        - Autre
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problème ou besoin
      description: Quel cas d'usage est bloqué ou difficile aujourd'hui ?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
      description: Description de la fonctionnalité souhaitée, avec exemples si possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      description: Autres approches écartées et pourquoi.

  - type: textarea
    id: context
    attributes:
      label: Contexte additionnel
      description: CVE / misconfig concernée, contraintes, liens utiles.
