name: Feature request
description: Suggest a new feature or improvement
labels: ["type:feature", "status:available"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New step action
        - Engine / runner improvement
        - REST API
        - Feed / YAML model
        - Infrastructure / mocks
        - CLI / UX
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What use case is blocked or painful today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Description of the desired feature, with examples if possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out and why.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Related CVE / misconfig, constraints, useful links.
