name: CVE — new feed
description: Implement detection for a CVE in noctis
labels: ["type:cve", "status:available", "priority:medium"]
body:
  - type: input
    id: cve_id
    attributes:
      label: CVE ID
      placeholder: "CVE-2024-XXXXX"
    validations:
      required: true

  - type: input
    id: product
    attributes:
      label: Product / component
      placeholder: "Apache Struts 2"
    validations:
      required: true

  - type: input
    id: affected_versions
    attributes:
      label: Affected versions
      placeholder: "< 2.5.33"
    validations:
      required: true

  - type: input
    id: cvss
    attributes:
      label: CVSS v3 score
      placeholder: "9.8"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
        - info
    validations:
      required: true

  - type: dropdown
    id: services
    attributes:
      label: Target services
      multiple: true
      options:
        - http
        - https
        - ssh
        - tcp
        - ftp
        - smtp
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Vulnerability description
      description: Exploitation mechanism, impact, context.
    validations:
      required: true

  - type: textarea
    id: detection_strategy
    attributes:
      label: Detection strategy
      description: |
        How to detect the vulnerability?
        e.g. path traversal on /dana-na/../ → check for /etc/passwd
             header injection → marker string in response
             version via /pom.properties endpoint

  - type: textarea
    id: references
    attributes:
      label: References
      description: NVD, advisory, PoC, writeup (one URL per line)
      placeholder: |
        https://nvd.nist.gov/vuln/detail/CVE-2024-XXXXX
        https://...
    validations:
      required: true

  - type: textarea
    id: mock_notes
    attributes:
      label: Docker mock notes
      description: |
        Hints for building the vuln/patched container.
        e.g. base image, endpoint to expose, expected behaviour.
