version: "3"

tasks:
  check-deps:
    desc: "Vérifie les prérequis et leurs versions minimales"
    preconditions:
      - sh: "which ansible-playbook"
        msg: "ansible-playbook not found — install ansible-core >= 2.15"
      - sh: "which podman"
        msg: "podman not found — install podman >= 4.0"
      - sh: "which cargo"
        msg: "cargo not found — install Rust >= 1.75"
      - sh: "python3 scripts/check-versions.py"
        msg: "Version requirements not met (see output above)"

  build:
    desc: "Build all local mock images (podman build, 66 mocks in parallel)"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - ansible-playbook playbooks/00-build-mocks.yml

  test:
    desc: "Test one CVE (TP + TN) — task test CVE=CVE-2021-41773"
    deps: [check-deps]
    dir: "{{.TASKFILE_DIR}}"
    requires:
      vars: [CVE]
    cmds:
      - |
        set +e
        ansible-playbook playbooks/00-build-noctis.yml playbooks/01-start-servers.yml
        startup_rc=$?
        if [ $startup_rc -eq 0 ]; then
          ansible-playbook playbooks/10-{{.CVE}}.yml -i inventories/{{.CVE}}
          test_rc=$?
        else
          test_rc=$startup_rc
        fi
        ansible-playbook playbooks/99-stop-servers.yml
        exit $test_rc

  test-all:
    desc: "Run all CVE tests — servers start once, CVEs run independently (failures don't stop the suite)"
    deps: [check-deps]
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        set +e
        ansible-playbook playbooks/00-build-noctis.yml playbooks/01-start-servers.yml
        startup_rc=$?
        overall_rc=0
        if [ $startup_rc -eq 0 ]; then
          for playbook in $(find playbooks -name '10-CVE-*.yml' | sort); do
            cve=$(basename "$playbook" .yml | sed 's/^10-//')
            if [ -d "inventories/$cve" ]; then
              ansible-playbook "$playbook" -i "inventories/$cve"
              [ $? -ne 0 ] && overall_rc=1
            fi
          done
        else
          overall_rc=$startup_rc
        fi
        ansible-playbook playbooks/99-stop-servers.yml
        exit $overall_rc

  clean:
    desc: "Remove all local noctis/* images"
    cmds:
      - podman images --format '{{"{{"}}{{".Repository"}}{{"}}"}}:{{"{{"}}{{".Tag"}}{{"}}"}}' | grep '^noctis/' | xargs -r podman rmi --ignore || true
