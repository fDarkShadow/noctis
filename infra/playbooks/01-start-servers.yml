---
- name: "Start noctis REST servers"
  hosts: localhost
  gather_facts: false

  vars:
    noctis_image: "noctis:ci"
    container_network: noctis_test_net
    noctis_plain_port: 8080
    noctis_oob_server_port: 8081
    noctis_oob_callback_port: 9090
    feeds_dir: "{{ playbook_dir }}/../../tests"
    config_file: "{{ playbook_dir }}/../../target/noctis-test-config.yml"

  tasks:
    - name: Ensure target/ directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../target"
        state: directory
        mode: '0755'

    - name: Ensure container network exists
      ansible.builtin.command:
        cmd: "podman network create {{ container_network }}"
      register: net_create
      failed_when: net_create.rc != 0 and 'already exists' not in net_create.stderr
      changed_when: net_create.rc == 0

    - name: Detect bridge gateway IP (OOB callback target for containers)
      ansible.builtin.command:
        cmd: >-
          podman network inspect {{ container_network }}
          --format '{{ "{{" }}range .Subnets{{ "}}" }}{{ "{{" }}.Gateway{{ "}}" }}{{ "{{" }}end{{ "}}" }}'
      register: gateway_reg
      changed_when: false

    - name: Add config to dummy host (single-invocation mode)
      ansible.builtin.add_host:
        name: noctis_config
        noctis_bridge_gateway: "{{ gateway_reg.stdout | trim }}"
        noctis_plain_port: "{{ noctis_plain_port }}"
        noctis_oob_server_port: "{{ noctis_oob_server_port }}"
        noctis_oob_callback_port: "{{ noctis_oob_callback_port }}"

    - name: Write server config to file (separate-invocation mode)
      ansible.builtin.copy:
        content: |
          noctis_bridge_gateway: "{{ gateway_reg.stdout | trim }}"
          noctis_plain_port: {{ noctis_plain_port }}
          noctis_oob_server_port: {{ noctis_oob_server_port }}
          noctis_oob_callback_port: {{ noctis_oob_callback_port }}
        dest: "{{ config_file }}"
        mode: '0644'

    - name: Remove any leftover noctis server containers
      ansible.builtin.command:
        cmd: "podman rm -f noctis-plain noctis-oob"
      failed_when: false
      changed_when: true

    - name: "Start server A — plain (port {{ noctis_plain_port }})"
      ansible.builtin.command:
        cmd: >-
          podman run -d
          --name noctis-plain
          --network host
          --restart on-failure:5
          -v {{ feeds_dir }}:/feeds:ro,z
          {{ noctis_image }}
          serve --host 127.0.0.1 --port {{ noctis_plain_port }}
      changed_when: true

    - name: "Start server B — OOB (port {{ noctis_oob_server_port }}, callback {{ noctis_oob_callback_port }})"
      ansible.builtin.command:
        cmd: >-
          podman run -d
          --name noctis-oob
          --network host
          --restart on-failure:5
          -v {{ feeds_dir }}:/feeds:ro,z
          {{ noctis_image }}
          serve --host 127.0.0.1 --port {{ noctis_oob_server_port }}
          --oob --oob-host {{ gateway_reg.stdout | trim }} --oob-port {{ noctis_oob_callback_port }}
      changed_when: true

    - name: Wait for server A to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ noctis_plain_port }}/health"
        status_code: 200
      register: health_a
      until: health_a.status == 200
      retries: 15
      delay: 1

    - name: Wait for server B to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ noctis_oob_server_port }}/health"
        status_code: 200
      register: health_b
      until: health_b.status == 200
      retries: 15
      delay: 1

    - name: Report
      ansible.builtin.debug:
        msg: |
          noctis servers ready
            A (plain) : http://127.0.0.1:{{ noctis_plain_port }}
            B (OOB)   : http://127.0.0.1:{{ noctis_oob_server_port }}
            OOB callback : {{ gateway_reg.stdout | trim }}:{{ noctis_oob_callback_port }}
            Feeds        : {{ feeds_dir }} → /feeds (container)
