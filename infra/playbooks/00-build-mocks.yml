---
- name: "Build test mock images (podman build, parallel across mocks)"
  hosts: localhost
  gather_facts: false

  vars:
    docker_dir: "{{ playbook_dir }}/../docker"

  tasks:
    # ── Standard images: Dockerfile.vuln + Dockerfile.patched ────────────────
    - name: Find all mock directories with Dockerfile.vuln
      ansible.builtin.find:
        paths: "{{ docker_dir }}"
        patterns: "Dockerfile.vuln"
        recurse: true
      register: vuln_dockerfiles

    - name: Launch podman build per mock (vuln + patched in sequence, mocks in parallel)
      ansible.builtin.shell: |
        set -e
        name="{{ item.path | dirname | basename }}"
        podman build -f Dockerfile.vuln   -t noctis/${name}:vuln   .
        podman build -f Dockerfile.patched -t noctis/${name}:patched .
      args:
        chdir: "{{ item.path | dirname }}"
        executable: /bin/sh
      loop: "{{ vuln_dockerfiles.files | sort(attribute='path') }}"
      loop_control:
        label: "{{ item.path | dirname | basename }}"
      async: 600
      poll: 0
      register: build_jobs

    - name: Wait for all standard builds to finish
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      loop: "{{ build_jobs.results }}"
      loop_control:
        label: "{{ item.item.path | dirname | basename }}"
      register: job_result
      until: job_result.finished
      retries: 60
      delay: 10

    # ── Special images: single Dockerfile, non-standard tag ──────────────────
    # phpunit: split into two dirs (one Dockerfile each) → noctis/phpunit-{vuln,patched}:local
    # openssh: per-version bases used by ssh-terrapin and regresshion mocks → noctis/openssh:9.x
    - name: Build special single-Dockerfile images
      ansible.builtin.shell: |
        set -e
        podman build -f Dockerfile -t {{ item.tag }} .
      args:
        chdir: "{{ docker_dir }}/{{ item.dir }}"
        executable: /bin/sh
      loop:
        - { dir: "phpunit-vuln",    tag: "noctis/phpunit-vuln:local" }
        - { dir: "phpunit-patched", tag: "noctis/phpunit-patched:local" }
        - { dir: "openssh-9.5",     tag: "noctis/openssh:9.5" }
        - { dir: "openssh-9.6",     tag: "noctis/openssh:9.6" }
      loop_control:
        label: "{{ item.dir }} → {{ item.tag }}"
      async: 600
      poll: 0
      register: special_build_jobs

    - name: Wait for special builds to finish
      ansible.builtin.async_status:
        jid: "{{ item.ansible_job_id }}"
      loop: "{{ special_build_jobs.results }}"
      loop_control:
        label: "{{ item.item.dir }}"
      register: special_job_result
      until: special_job_result.finished
      retries: 60
      delay: 10
