events {}

http {
    server {
        listen 80;
        server_name _;

        # Pulse Secure landing page (service detection)
        location /dana-na/auth/url_default/welcome.cgi {
            return 200 '<html><body>Welcome to the Pulse Secure</body></html>';
            add_header Content-Type text/html;
        }

        # Vulnerable endpoint: dana-na/../... path traversal resolved as file read
        # The pattern /dana-na/../dana/html5acc/guacamole/../../../../../../../<file>
        # is normalised by Nginx to /<file> — simulated here with an explicit rule.
        location ~* "/dana-na/\.\./dana/html5acc/guacamole/(\.\./)+etc/passwd" {
            alias /etc/passwd.fake;
            add_header Content-Type text/plain;
        }

        location ~* "/dana-na/\.\./dana/html5acc/guacamole/(\.\./)+etc/hosts" {
            return 200 "127.0.0.1\tlocalhost\n::1\tlocalhost\n";
            add_header Content-Type text/plain;
        }

        # Tout le reste → 404
        location / {
            return 404;
        }
    }
}
