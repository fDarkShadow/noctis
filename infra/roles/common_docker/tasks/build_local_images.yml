---
- name: Build Apache CVE-2021-41773 (vuln)
  ansible.builtin.command:
    cmd: "{{ container_runtime }} build -t noctis/apache-cve-2021-41773:vuln -f Dockerfile.vuln ."
    chdir: "{{ docker_dir }}/apache-cve-2021-41773"
  changed_when: true

- name: Build Apache CVE-2021-41773 (patched)
